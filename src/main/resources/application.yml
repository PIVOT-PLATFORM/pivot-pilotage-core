spring:
  application:
    name: pivot-pilotage-backend

  datasource:
    # Même instance Postgres partagée que pivot-core (même nom de base "pivot"), schéma
    # dédié "pilotage" (cf. pivot-platform/CLAUDE.md — une seule instance, un schéma par
    # module-core, FK cross-schéma uniquement vers public.teams.id / public.tenants.id).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pivot}
    username: ${SPRING_DATASOURCE_USERNAME:pivot}
    password: ${SPRING_DATASOURCE_PASSWORD:pivot}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: pilotage

  flyway:
    enabled: true
    # create-schemas (defaut Flyway: true) cree le schema "pilotage" avant la 1ere migration —
    # sans schemas/default-schema explicites, Flyway retombe sur le schema par defaut de la
    # connexion (public) et entre en collision avec flyway_schema_history de pivot-core.
    schemas: pilotage
    default-schema: pilotage
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      # Valeurs par défaut : overridées via SPRING_DATA_REDIS_HOST / SPRING_DATA_REDIS_PORT
      # par le relaxed binding Spring Boot (Spring Boot 4.x, pas de placeholder ${...} nécessaire).
      host: localhost
      port: 6379

  jackson:
    deserialization:
      # Jackson 3.x flipped this default to false (silently ignore unknown JSON properties) —
      # explicitly re-enabled: aligné sur pivot-core, même posture de sécurité par défaut sur
      # tout endpoint futur de ce module (rejet 400 d'un champ non attendu plutôt que silent drop).
      fail-on-unknown-properties: true

server:
  port: ${SERVER_PORT:8081}
  servlet:
    # nginx (pivot-ui/nginx.conf) proxy_pass sans réécriture de préfixe : /api/pilotage/**
    # doit être servi tel quel côté JVM — voir pattern identique sur pivot-collaboratif-core.
    context-path: /api/pilotage

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    fr.pivot: ${LOG_LEVEL_PIVOT:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:WARN}
    org.flywaydb: ${LOG_LEVEL_FLYWAY:WARN}

pivot:
  activemq:
    # EN07.3 — shared ActiveMQ broker (KahaDB persistence, DLQ.pilotage), owned/configured by
    # pivot-core. Default host/port match its Docker Compose service (dev + prod) — see
    # WebSocketConfig for the relay itself.
    # EN07.3 relay to the shared ActiveMQ broker. Default true (dev/compose). Set false to fall
    # back to an in-process SimpleBroker when no ActiveMQ is deployed — the managed-min Cloud Run
    # stack passes PIVOT_ACTIVEMQ_RELAY_ENABLED=false (no broker VM). See WebSocketConfig.
    relay-enabled: ${PIVOT_ACTIVEMQ_RELAY_ENABLED:true}
    relay-host: ${PIVOT_ACTIVEMQ_RELAY_HOST:activemq}
    relay-port: ${PIVOT_ACTIVEMQ_RELAY_PORT:61613}
  cors:
    # WebSocket handshake origin (EN07.3 WebSocketConfig) — consumed by the WS endpoint. The
    # first REST controller (EN18.10 écart #3, OrganizationProfileController) does not yet need
    # its own CORS wiring (no browser client consumes it directly today).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
