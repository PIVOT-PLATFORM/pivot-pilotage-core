name: Setup Java + Maven
description: Configure Temurin 25 with Maven dependency cache (single source of truth)

runs:
  using: composite
  steps:
    - name: Setup Java 25
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
